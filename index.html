<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tekst</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'purple-brand': '#55056D',
              'lime-brand': '#DDFFB2'
            }
          }
        }
      }
    </script>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-sans antialiased overflow-hidden selection:bg-purple-brand/30">
    <div id="app" class="h-[100dvh] w-full max-w-md mx-auto bg-zinc-950 flex flex-col relative overflow-hidden shadow-2xl">
      <!-- Dynamic Content Injection Point -->
    </div>
    
    <!-- Initialize App -->
    <script src="./main.js"></script>
  </body>
</html>
